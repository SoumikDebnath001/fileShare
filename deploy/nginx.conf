# nginx reverse proxy for fileShare.
#
# Install on the Pi:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/fileshare
#   sudo ln -s /etc/nginx/sites-available/fileshare /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace files.example.com with YOUR domain (the one pointing at the Pi).
#
# After this works on plain HTTP, get a free HTTPS certificate:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d files.example.com
# certbot will edit this file to add the TLS config automatically.

server {
    listen 80;
    server_name files.example.com;

    # Must be >= FILESHARE_MAX_GB or large uploads get rejected by nginx.
    client_max_body_size 8G;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow slow uploads/downloads of big files over the Pi's link.
        proxy_request_buffering off;
        proxy_read_timeout      3600;
        proxy_send_timeout      3600;
    }
}
